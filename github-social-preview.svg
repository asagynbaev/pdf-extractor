<?xml version="1.0" encoding="UTF-8"?>
<svg width="1280" height="640" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e293b;stop-opacity:1" />
    </linearGradient>
  </defs>

  <rect width="1280" height="640" fill="url(#bgGradient)"/>

  <!-- Accent line -->
  <rect x="0" y="0" width="1280" height="4" fill="#10b981"/>

  <!-- Main title -->
  <text x="60" y="100" font-size="72" font-weight="bold" fill="#ffffff" font-family="Arial, sans-serif">
    pdf-extractor
  </text>

  <!-- Subtitle -->
