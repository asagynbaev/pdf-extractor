  <!-- Box 3: Support -->
  <rect x="780" y="290" width="440" height="140" fill="#1e293b" stroke="#10b981" stroke-width="2" rx="8"/>
  <text x="810" y="325" font-size="18" font-weight="bold" fill="#10b981" font-family="Arial, sans-serif">
