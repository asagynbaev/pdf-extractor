  </text>

  <!-- Box 2: Accuracy -->
  <rect x="420" y="290" width="280" height="140" fill="#1e293b" stroke="#10b981" stroke-width="2" rx="8"/>
  <text x="450" y="325" font-size="18" font-weight="bold" fill="#10b981" font-family="Arial, sans-serif">
    99% Accuracy
  </text>
  <text x="450" y="355" font-size="28" font-weight="bold" fill="#ffffff" font-family="Arial, sans-serif">
