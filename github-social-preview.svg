  </text>
  <text x="90" y="385" font-size="14" fill="#9ca3af" font-family="Arial, sans-serif">
    847K chunks extracted
  </text>
  <text x="90" y="410" font-size="14" fill="#9ca3af" font-family="Arial, sans-serif">
